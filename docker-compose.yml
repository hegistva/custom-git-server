services:
  postgres:
    image: postgres:16-alpine
    container_name: git-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-git_platform}
      POSTGRES_USER: ${POSTGRES_USER:-git_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    networks:
      - gitnet
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-git_platform} -d ${POSTGRES_DB:-git_platform}',
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: always

  backend:
    build: ./apps/backend
    container_name: git-backend
    env_file:
      - ./.env
    environment:
      - PORT=${BACKEND_PORT:-4000}
      - DISABLE_AUTH_RATE_LIMIT=${DISABLE_AUTH_RATE_LIMIT:-false}
    expose:
      - '4000'
    volumes:
      - ./keys:/data/keys
      - ./repos:/git-repos
    networks:
      - gitnet
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:' + (process.env.PORT || 4000) + '/internal/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: always

  frontend:
    build: ./apps/frontend
    container_name: git-frontend
    env_file:
      - ./.env
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://localhost/api}
    expose:
      - '3000'
    networks:
      - gitnet
    restart: always

  git-server:
    build: ./infra/git-server
    container_name: git-server
    ports:
      - '2222:22' # SSH
    volumes:
      - ./repos:/git-repos
      - ./keys/authorized_keys:/home/git/.ssh/authorized_keys
    networks:
      - gitnet
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: git-caddy
    depends_on:
      - git-server
      - frontend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - gitnet
    restart: always

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  gitnet:
