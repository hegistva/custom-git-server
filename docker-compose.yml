services:
  backend:
    build: ./apps/backend
    container_name: git-backend
    env_file:
      - ./.env
    environment:
      - PORT=${BACKEND_PORT:-4000}
    expose:
      - "4000"
    networks:
      - gitnet
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 4000) + '/internal/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: always

  git-server:
    build: ./infra/git-server
    container_name: git-server
    ports:
      - "2222:22"  # SSH
    volumes:
      - ./repos:/git-repos
      - ./keys/authorized_keys:/home/git/.ssh/authorized_keys
    networks:
      - gitnet
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: git-caddy
    depends_on:
      - git-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - gitnet
    restart: always

volumes:
  caddy_data:
  caddy_config:

networks:
  gitnet: