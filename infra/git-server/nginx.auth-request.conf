events { worker_connections 1024; }
http {
    server {
        listen 80;

        location = /auth-check {
            internal;
            proxy_pass http://backend:4000/internal/git-auth;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        location ~ /(.+\.git)(/.*|$) {
            auth_request /auth-check;
            auth_request_set $auth_username $upstream_http_x_auth_username;
            error_page 401 = @auth_401;

            include /etc/nginx/fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /usr/libexec/git-core/git-http-backend;
            fastcgi_param GIT_HTTP_EXPORT_ALL "";
            fastcgi_param GIT_PROJECT_ROOT /git-repos;
            fastcgi_param HOME /home/git;
            fastcgi_param PATH_INFO $uri;
            fastcgi_param REMOTE_USER $auth_username;
            fastcgi_pass unix:/run/fcgiwrap.socket;
        }

        location @auth_401 {
            add_header WWW-Authenticate "Basic realm=\"Git\"" always;
            return 401;
        }
    }
}
